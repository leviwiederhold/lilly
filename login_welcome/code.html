<body class="bg-surface text-on-surface flex flex-col min-h-screen">
<!-- Hero Background Element (Visual Anchor) -->
<div class="fixed inset-0 z-0 pointer-events-none opacity-50 overflow-hidden">
<div class="absolute -top-24 -right-24 w-96 h-96 rounded-full bg-primary-container/20 blur-[80px]"></div>
<div class="absolute -bottom-24 -left-24 w-80 h-80 rounded-full bg-secondary-container/30 blur-[60px]"></div>
<div class="absolute inset-0 bg-grain"></div>
</div>
<!-- Main Content Canvas -->
<main class="relative z-10 flex-grow flex flex-col items-center justify-center px-container-padding py-stack-lg">
<!-- Brand Header Section -->
<header class="text-center mb-stack-lg animate-fade-in">
<div class="inline-flex items-center justify-center w-16 h-16 bg-surface-container-lowest soft-elevation rounded-full mb-stack-md mx-auto">
<span class="material-symbols-outlined text-primary text-3xl" data-icon="spa">spa</span>
</div>
<h1 class="font-headline-lg text-headline-lg text-on-surface mb-stack-sm">Studio Balance</h1>
<p class="font-body-lg text-body-lg text-tertiary max-w-[280px] mx-auto opacity-80">
                Track income, expenses, and cash with less stress
            </p>
</header>
<!-- Auth Card -->
<section class="w-full max-w-md bg-surface-container-lowest p-8 rounded-xl soft-elevation">
<form class="space-y-gutter">
<!-- Email Field -->
<div class="group">
<label class="font-label-caps text-label-caps text-on-surface-variant mb-2 block" for="email">EMAIL ADDRESS</label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-4 text-tertiary text-lg" data-icon="mail">mail</span>
<input class="w-full pl-12 pr-4 py-4 bg-surface-container-low border-none rounded-lg font-body-md focus:ring-1 focus:ring-primary-container transition-all" id="email" placeholder="hello@yourstudio.com" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="group">
<label class="font-label-caps text-label-caps text-on-surface-variant mb-2 block" for="password">PASSWORD</label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-4 text-tertiary text-lg" data-icon="lock">lock</span>
<input class="w-full pl-12 pr-12 py-4 bg-surface-container-low border-none rounded-lg font-body-md focus:ring-1 focus:ring-primary-container transition-all" id="password" placeholder="••••••••" type="password"/>
<button class="absolute right-4 text-tertiary/60 hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined text-lg" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<!-- Helper Actions -->
<div class="flex items-center justify-between py-2">
<label class="flex items-center space-x-2 cursor-pointer">
<input class="w-4 h-4 rounded border-outline-variant text-primary focus:ring-primary-container" type="checkbox"/>
<span class="font-body-md text-tertiary">Remember me</span>
</label>
<a class="font-body-md text-primary font-medium hover:underline decoration-primary/30" href="#">Forgot password?</a>
</div>
<!-- Sign In Button -->
<button class="w-full bg-primary text-on-primary py-4 rounded-lg font-headline-sm hover:opacity-90 active:scale-[0.98] transition-all soft-elevation" type="submit">
                    Sign In
                </button>
<!-- Social/Quick Auth Divider -->
<div class="relative py-4 flex items-center">
<div class="flex-grow border-t border-surface-container-highest"></div>
<span class="flex-shrink mx-4 font-label-caps text-tertiary-container">OR</span>
<div class="flex-grow border-t border-surface-container-highest"></div>
</div>
<!-- Biometric/Secondary Action -->
<button class="w-full border border-primary-container text-primary py-4 rounded-lg font-headline-sm hover:bg-primary-container/5 transition-colors flex items-center justify-center gap-2" type="button">
<span class="material-symbols-outlined" data-icon="fingerprint">fingerprint</span>
                    Sign in with FaceID
                </button>
</form>
</section>
<!-- Footer Footer -->
<footer class="mt-stack-lg text-center">
<p class="font-body-md text-tertiary">
                Don't have an account? 
                <a class="text-primary font-semibold hover:underline" href="#">Start your free trial</a>
</p>
</footer>
</main>
<!-- Visual Detail: Featured Service Image Card (Asymmetric Layout element) -->

<div class="absolute bottom-0 left-0 right-0 p-4 bg-gradient-to-t from-black/40 to-transparent">
<p class="text-white font-headline-sm text-sm">Organize with grace.</p>
</div>
</div>
