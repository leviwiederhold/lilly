</header>
<!-- Main Content Canvas -->
<main class="pt-24 pb-32 px-container-padding max-w-lg mx-auto min-h-screen">
<!-- Header Section -->
<div class="mb-stack-lg">
<h1 class="font-headline-lg text-on-surface mb-2">Add Income</h1>
<p class="font-body-md text-tertiary">Record a new client session payment.</p>
</div>
<!-- Form Card -->
<div class="bg-white rounded-xl soft-shadow p-6 space-y-stack-md">
<!-- Date & Client -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-gutter">
<div class="space-y-1">
<label class="font-label-caps text-tertiary">DATE</label>
<input class="w-full bg-surface-container-low border-none rounded-lg p-3 font-body-md" type="date" value="2023-11-24"/>
</div>
<div class="space-y-1">
<label class="font-label-caps text-tertiary">CLIENT NAME</label>
<input class="w-full bg-surface-container-low border-none rounded-lg p-3 font-body-md" placeholder="Sarah Johnson" type="text"/>
</div>
</div>
<!-- Service Selection -->
<div class="space-y-1">
<label class="font-label-caps text-tertiary">SERVICE</label>
<select class="w-full bg-surface-container-low border-none rounded-lg p-3 font-body-md appearance-none">
<option>Signature HydraFacial</option>
<option>Dermaplaning Treatment</option>
<option>Chemical Peel</option>
<option>Lash Lift &amp; Tint</option>
<option>Brow Lamination</option>
</select>
</div>
<!-- Payment Type Selector -->
<div class="space-y-2">
<label class="font-label-caps text-tertiary">PAYMENT METHOD</label>
<div class="flex flex-wrap gap-2">
<button class="px-4 py-2 rounded-full border border-primary-container bg-primary-container/10 text-on-primary-container font-body-md text-sm">Card</button>
<button class="px-4 py-2 rounded-full border border-stone-100 bg-surface-container-low text-tertiary font-body-md text-sm hover:bg-stone-100">Cash</button>
<button class="px-4 py-2 rounded-full border border-stone-100 bg-surface-container-low text-tertiary font-body-md text-sm hover:bg-stone-100">Venmo</button>
<button class="px-4 py-2 rounded-full border border-stone-100 bg-surface-container-low text-tertiary font-body-md text-sm hover:bg-stone-100">Zelle</button>
</div>
</div>
<!-- Financial Inputs -->
<div class="grid grid-cols-2 gap-gutter pt-2">
<div class="space-y-1">
<label class="font-label-caps text-tertiary">SERVICE AMOUNT</label>
<div class="relative">
<span class="absolute left-3 top-3 text-tertiary">$</span>
<input class="w-full bg-surface-container-low border-none rounded-lg p-3 pl-7 font-body-md" placeholder="150.00" type="number"/>
</div>
</div>
<div class="space-y-1">
<label class="font-label-caps text-tertiary">TIP</label>
<div class="relative">
<span class="absolute left-3 top-3 text-tertiary">$</span>
<input class="w-full bg-surface-container-low border-none rounded-lg p-3 pl-7 font-body-md" placeholder="30.00" type="number"/>
</div>
</div>
</div>

<div class="mt-8 pt-6 border-t border-stone-100">
<div class="flex justify-between items-end">
<div>
<p class="font-label-caps text-tertiary mb-1">TOTAL RECEIVED</p>
